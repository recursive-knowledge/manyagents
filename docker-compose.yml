# The local Bank is brought up via `make bank-up` (`npx supabase start`),
# which manages its own container stack. This compose file is reserved for
# the read-only Svelte viewer dev service, wired in M9 (oma.web). Until then
# it declares no services so `docker compose config` stays valid and
# `make web-up` documents the seam.
#
# M9 will add, e.g.:
#   services:
#     viewer:
#       build: ./src/oma/web/app
#       ports: ["5173:5173"]
#       environment:
#         OMA_API_URL: "http://host.docker.internal:8000"
name: oh-my-agent
