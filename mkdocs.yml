site_name: Oh My Agent
site_url: https://oh-my-agent.org/
site_description: Wrap installed coding-agent CLIs; curate cross-session knowledge.
repo_url: https://github.com/formula-code/oh-my-agent
repo_name: formula-code/oh-my-agent

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

# The frozen design docs ship in the repo (docs/design/) but are excluded from
# the rendered site nav so `mkdocs build --strict` stays green; they are the
# "why", surfaced via the repo, not the docs site (Package Structure & Workflow).
exclude_docs: |
  design/
  archive/

validation:
  links:
    not_found: info

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
  - Guide:
      - Quickstart: guide/quickstart.md
      - Curation: guide/curation.md
      - Viewer & read API: guide/viewer.md
      - Authoring an installer: guide/authoring-an-installer.md
