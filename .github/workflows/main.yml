name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC — triggers integration job only
  workflow_dispatch:

jobs:
  # Lint/format/typecheck/deptry. Single OS (canonical) — these tools are
  # platform-independent in result, and `make` + a tightly-versioned
  # `pre-commit` cache is most reliable on Linux.
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run checks
        run: make check

  # The behaviour matrix: every OS × Python combination runs pytest and mypy.
  # `make` isn't standard on Windows; we invoke `uv run` directly so the job
  # doesn't need a separate `chocolatey install make` step.
  tests-and-type-check:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run python -m pytest --cov --cov-config=pyproject.toml --cov-report=xml

      - name: Check typing
        run: uv run mypy

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Integration tests — require a live local Supabase Bank (npx + Docker) and
  # are therefore best-effort. Triggered only on nightly schedule and manual
  # workflow_dispatch to avoid blocking every PR on infra flakiness.
  # NOTE: this job has not been validated in this CI environment and may need
  # follow-up tuning (secrets, runner docker-in-docker support, timing).
  integration:
    name: integration tests (nightly / manual)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    continue-on-error: true # best-effort — Bank infra may be flaky
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Start local Bank
        run: make bank-up

      - name: Apply migrations
        run: make bank-migrate

      - name: Run integration tests
        run: MANYAGENT_RUN_INTEGRATION=1 uv run pytest -m integration
